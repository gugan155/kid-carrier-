    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

      min-height:100vh;
      font-family:'Nunito',sans-serif;
      color:#fff;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:20px 16px 60px;
    }

    .mp-header{
      width:100%;max-width:560px;
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:24px;
    }
    .mp-logo{
      display:flex;align-items:center;gap:6px;
      text-decoration:none;color:rgba(255,255,255,.55);
      font-size:.82rem;font-weight:700;transition:color .2s;
    }
    .mp-logo:hover{color:#fff}
    .mp-title-wrap{text-align:center}
    .mp-page-title{font-size:1.05rem;font-weight:900;color:#a78bfa}
    .mp-step-label{font-size:.7rem;color:rgba(255,255,255,.4);margin-top:2px}

    .mp-dots{display:flex;gap:6px;margin-bottom:28px}
    .mp-dot{
      width:8px;height:8px;border-radius:50%;
      background:rgba(255,255,255,.18);transition:all .35s ease;
    }
    .mp-dot.active{background:#a855f7;width:26px;border-radius:4px}
    .mp-dot.done{background:rgba(124,58,237,.7)}

    .mp-card{
      width:100%;max-width:560px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12);
      border-radius:24px;padding:32px 22px 26px;
      backdrop-filter:blur(14px);overflow:hidden;
    }

    .mp-q-wrap{transition:transform .28s ease,opacity .28s ease}
    .mp-q-wrap.exit{transform:translateX(-50px);opacity:0}
    .mp-q-wrap.enter{transform:translateX(50px);opacity:0}

    .mp-q-icon{font-size:2.4rem;display:block;text-align:center;margin-bottom:10px}
    .mp-q-num{
      font-size:.68rem;font-weight:700;color:#a855f7;
      text-transform:uppercase;letter-spacing:.1em;
      text-align:center;margin-bottom:8px;
    }
    .mp-q-text{
      font-size:1.18rem;font-weight:800;line-height:1.45;
      text-align:center;margin-bottom:24px;
    }

    .mp-opts{display:flex;flex-direction:column;gap:10px}
    .mp-opt{
      display:flex;align-items:center;gap:14px;
      background:rgba(255,255,255,.06);
      border:2px solid rgba(255,255,255,.1);
      border-radius:14px;padding:14px 16px;
      cursor:pointer;font-family:'Nunito',sans-serif;
      font-size:.93rem;font-weight:700;color:#fff;
      text-align:left;transition:all .15s;width:100%;
    }
    .mp-opt:hover{
      border-color:rgba(168,85,247,.6);
      background:rgba(168,85,247,.12);
      transform:translateX(4px);
    }
    .mp-opt.selected{
      border-color:#a855f7;
      background:rgba(168,85,247,.25);
      transform:scale(1.02);
    }
    .mp-opt:disabled{cursor:default}
    .mp-opt-emoji{font-size:1.5rem;width:36px;flex-shrink:0;text-align:center}

    /* Result */
    .mp-result{width:100%;max-width:560px;display:none}
    .mp-result.show{display:block}

    .mp-profile-card{
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12);
      border-radius:24px;padding:32px 22px 28px;
      backdrop-filter:blur(14px);text-align:center;
      margin-bottom:14px;
      animation:mpFadeUp .6s ease both;
    }
    @keyframes mpFadeUp{
      from{opacity:0;transform:translateY(22px)}
      to{opacity:1;transform:translateY(0)}
    }

    .mp-profile-big{font-size:4.5rem;display:block;margin-bottom:12px}
    .mp-profile-type-label{
      font-size:.68rem;font-weight:700;text-transform:uppercase;
      letter-spacing:.12em;color:#a855f7;margin-bottom:4px;
    }
    .mp-profile-name{font-size:2rem;font-weight:900;margin-bottom:14px}
    .mp-profile-desc{

    .mp-career-arrow{font-size:1.1rem;color:rgba(255,255,255,.3);flex-shrink:0}

    .mp-roadmap-title{

    .mp-road-num{

// ─── State ───
var scores = {};
var currentQ = 0;
var TOTAL = QUESTIONS.length;

// ─── Build dots ───
var dotsEl = document.getElementById('mp-dots');
for (var i = 0; i < TOTAL; i++) {
  var d = document.createElement('div');
  d.className = 'mp-dot' + (i === 0 ? ' active' : '');
  d.id = 'dot-' + i;
  dotsEl.appendChild(d);
}

function updateDots(idx) {
  for (var i = 0; i < TOTAL; i++) {
    var d = document.getElementById('dot-' + i);
    if (!d) continue;
    d.className = 'mp-dot' + (i < idx ? ' done' : i === idx ? ' active' : '');
  }
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderQ(idx) {
  var q = QUESTIONS[idx];
  document.getElementById('mp-step-label').textContent = 'Вопрос ' + (idx+1) + ' из ' + TOTAL;
  updateDots(idx);

  var wrap = document.getElementById('mp-q-wrap');
  wrap.innerHTML =
    '<span class="mp-q-icon">' + q.icon + '</span>' +
    '<div class="mp-q-num">Вопрос ' + (idx+1) + '</div>' +
    '<div class="mp-q-text">' + esc(q.q) + '</div>' +
    '<div class="mp-opts">' +
    q.opts.map(function(o, oi) {
      return '<button class="mp-opt" data-oi="' + oi + '">' +
        '<span class="mp-opt-emoji">' + o.e + '</span>' +
        '<span>' + esc(o.t) + '</span>' +
        '</button>';
    }).join('') +
    '</div>';

  wrap.querySelectorAll('.mp-opt').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var oi = parseInt(this.dataset.oi);
      document.querySelectorAll('.mp-opt').forEach(function(b) { b.disabled = true; });
      this.classList.add('selected');

      var vals = QUESTIONS[idx].opts[oi].v;
      Object.keys(vals).forEach(function(k) { scores[k] = (scores[k] || 0) + vals[k]; });

      setTimeout(function() {
        if (idx + 1 < TOTAL) {
          wrap.classList.add('exit');
          setTimeout(function() {
            wrap.classList.remove('exit');
            wrap.classList.add('enter');
            currentQ = idx + 1;
            renderQ(currentQ);
            requestAnimationFrame(function() {
              requestAnimationFrame(function() {
                wrap.classList.remove('enter');
              });
            });
          }, 280);
        } else {
          showResult();
        }
      }, 380);
    });
  });
}

function getProfileKey() {
  var ps = {
    explorer:  (scores.curious||0)      + (scores.analytical||0),
    builder:   (scores.builder||0)      + (scores.hands||0),
    guardian:  (scores.empathy||0)      + (scores.social||0),
    creator:   (scores.creative||0)     + (scores.visual||0),
    innovator: (scores.logical||0)      + (scores.competitive||0)
  };
  return Object.keys(ps).reduce(function(a, b) { return ps[a] >= ps[b] ? a : b; });
}

function showResult() {
  document.getElementById('mp-card').style.display = 'none';
  document.getElementById('mp-dots').style.display = 'none';
  document.getElementById('mp-step-label').textContent = 'Твой профиль готов! 🎉';

  var key = getProfileKey();
  var p = PROFILES[key];

  // Profile card
  document.getElementById('mp-profile-card').innerHTML =
    '<span class="mp-profile-big">' + p.emoji + '</span>' +
    '<div class="mp-profile-type-label">Твой тип мышления</div>' +
    '<div class="mp-profile-name" style="color:' + p.color + '">' + esc(p.name) + '</div>' +
    '<p class="mp-profile-desc">' + esc(p.desc) + '</p>';

  // DNA bars
  document.getElementById('mp-dna-card').innerHTML =
    '<div class="mp-dna-title">🧬 Карьерная ДНК</div>' +
    p.strengths.map(function(s) {
      return '<div class="mp-trait">' +
        '<div class="mp-trait-label">' + esc(s.label) + '</div>' +
        '<div class="mp-trait-bar-wrap">' +
          '<div class="mp-trait-bar-fill" data-pct="' + s.pct + '" style="background:' + s.color + '"></div>' +
        '</div>' +
        '<span class="mp-trait-pct" style="color:' + s.color + '">' + s.pct + '%</span>' +
        '</div>';
    }).join('');

  // Career cards
  document.getElementById('mp-career-cards').innerHTML =
    p.careers.map(function(c) {
      return '<a href="' + c.href + '" class="mp-career-card">' +
        '<span class="mp-career-emoji">' + c.icon + '</span>' +
        '<div class="mp-career-info">' +
          '<div class="mp-career-name">' + esc(c.name) + '</div>' +
          '<div class="mp-career-why">' + esc(c.why) + '</div>' +
        '</div>' +
        '<span class="mp-career-arrow">→</span>' +
        '</a>';
    }).join('');

  // Roadmap
  document.getElementById('mp-roadmap').innerHTML =
    '<div class="mp-roadmap-title">🗺️ Твой личный маршрут:</div>' +
    '<div class="mp-roadmap-steps">' +
    p.roadmap.map(function(step, i) {
      return '<div class="mp-road-step">' +
        '<div class="mp-road-num">' + (i+1) + '</div>' +
        '<div class="mp-road-text">' + esc(step) + '</div>' +
        '</div>';
    }).join('') +
    '</div>';

  document.getElementById('mp-result').classList.add('show');

  // Animate bars after paint
  setTimeout(function() {
    document.querySelectorAll('.mp-trait-bar-fill').forEach(function(bar) {
      bar.style.width = bar.dataset.pct + '%';
    });
  }, 120);

  // Save button
  document.getElementById('mp-save-btn').addEventListener('click', function() {
    try {
      var prog = JSON.parse(localStorage.getItem('kl_progress') || '{}');
      if (!prog.myPathDone) {
        prog.points = (prog.points || 0) + 30;
        prog.myPathDone = true;
        localStorage.setItem('kl_progress', JSON.stringify(prog));
      }
      localStorage.setItem('kl_my_path', JSON.stringify({
        profile: key, name: p.name, emoji: p.emoji, scores: scores, ts: Date.now()
      }));
      this.textContent = '✅ Путь сохранён! +30 XP';
      this.style.background = 'linear-gradient(135deg,#059669,#10b981)';
    } catch(e) {}
  });

  // Retake
  document.getElementById('mp-retake-btn').addEventListener('click', function() {
    scores = {}; currentQ = 0;
    document.getElementById('mp-result').classList.remove('show');
    document.getElementById('mp-card').style.display = '';
    document.getElementById('mp-dots').style.display = '';
    document.getElementById('mp-save-btn').textContent = '💾 Сохранить мой путь +30 XP';
    document.getElementById('mp-save-btn').style.background = '';
    renderQ(0);
  });
}

// ─── Start ───
renderQ(0);
</script>
</body>
</html>
