<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#7c3aed" />
  <link rel="manifest" href="manifest.json" />
  <title>Таблица лидеров — Карьерная Лаборатория</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0a1e;
      --surface: rgba(255,255,255,0.05);
      --border: rgba(167,139,250,0.2);
      --purple: #7c3aed;
      --purple-light: #a78bfa;
      --gold: #f59e0b;
      --silver: #94a3b8;
      --bronze: #b45309;
      --green: #10b981;
      --text: #f1f5f9;
      --text-muted: rgba(255,255,255,0.5);
      --me-bg: rgba(124,58,237,0.25);
      --me-border: rgba(167,139,250,0.6);
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .lb-header {
      text-align: center;
      padding: 24px 16px 12px;
      background: linear-gradient(180deg, rgba(124,58,237,0.18) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
    }
    .lb-title {
      font-size: clamp(1.5rem, 5vw, 2.8rem);
      font-weight: 900;
      background: linear-gradient(135deg, #a78bfa, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .lb-subtitle {
      font-size: clamp(0.78rem, 2vw, 1rem);
      color: var(--text-muted);
      margin-top: 4px;
    }
    .lb-live-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .lb-live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.4);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 0.78rem;
      font-weight: 700;
      color: #fca5a5;
    }
    .lb-live-dot {
      width: 8px; height: 8px;
      background: #ef4444;
      border-radius: 50%;
      animation: livePulse 1.2s ease-in-out infinite;
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }
    .lb-count-badge {
      background: rgba(167,139,250,0.15);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 0.78rem;
      color: var(--purple-light);
      font-weight: 700;
    }

    /* ── TABLE ── */
    .lb-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px 24px;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
    }
    .lb-table { width: 100%; border-collapse: collapse; }
    .lb-table thead th {
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }
    .lb-table thead th.th-xp,
    .lb-table thead th.th-level { text-align: right; }

    .lb-row {
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.2s ease;
      animation: rowIn 0.35s ease both;
    }
    .lb-row:hover { background: rgba(255,255,255,0.03); }
    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .lb-row.lb-me {
      background: var(--me-bg);
      border-left: 3px solid var(--purple-light);
    }
    .lb-row.lb-me td { color: #e9d5ff; }

    .lb-row.rank-1 { background: rgba(245,158,11,0.08); border-left: 3px solid var(--gold); }
    .lb-row.rank-2 { background: rgba(148,163,184,0.06); border-left: 3px solid var(--silver); }
    .lb-row.rank-3 { background: rgba(180,83,9,0.08); border-left: 3px solid var(--bronze); }

    .lb-table td { padding: 12px 10px; vertical-align: middle; }

    .td-rank {
      width: 48px;
      text-align: center;
      font-size: 1.3rem;
    }
    .td-name {
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      font-weight: 800;
    }
    .td-name .you-tag {
      display: inline-block;
      background: var(--purple);
      color: #fff;
      font-size: 0.6rem;
      font-weight: 900;
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 6px;
      vertical-align: middle;
      letter-spacing: 0.05em;
    }
    .td-xp {
      text-align: right;
      font-size: clamp(0.9rem, 2.5vw, 1.05rem);
      font-weight: 900;
      color: var(--gold);
      white-space: nowrap;
    }
    .td-level {
      text-align: right;
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      color: var(--purple-light);
      white-space: nowrap;
    }

    /* empty / loading */
    .lb-empty-row td {
      text-align: center;
      padding: 48px 16px;
      color: var(--text-muted);
      font-size: 1rem;
    }

    /* ── FOOTER ── */
    .lb-footer {
      text-align: center;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .lb-updated { color: var(--green); font-weight: 700; }
    .lb-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(124,58,237,0.2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 14px;
      color: var(--purple-light);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 700;
      transition: background 0.2s;
    }
    .lb-back:hover { background: rgba(124,58,237,0.35); }

    @media (max-width: 480px) {
      .td-level { display: none; }
      .lb-table thead th.th-level { display: none; }
      .lb-title { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <header class="lb-header">
    <div class="lb-title">🏆 Таблица лидеров</div>
    <div class="lb-subtitle">Карьерная Лаборатория · Лагерь 21 июня 2026</div>
    <div class="lb-live-row">
      <span class="lb-live-badge">
        <span class="lb-live-dot"></span>
        ПРЯМОЙ ЭФИР
      </span>
      <span class="lb-count-badge" id="lb-count">— участников</span>
    </div>
  </header>

  <div class="lb-wrap">
    <table class="lb-table" id="lb-table">
      <thead>
        <tr>
          <th style="width:48px">#</th>
          <th>Имя</th>
          <th class="th-xp">XP</th>
          <th class="th-level">Уровень</th>
        </tr>
      </thead>
      <tbody id="lb-body">
        <tr class="lb-empty-row"><td colspan="4">⏳ Подключение...</td></tr>
      </tbody>
    </table>
  </div>

  <footer class="lb-footer">
    <span class="lb-updated" id="lb-updated"></span>
    <a href="index.html" class="lb-back">← На главную</a>
  </footer>

  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      query,
      orderBy,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    import { FIREBASE_CONFIG } from "./firebase.config.js";

    const LEVELS = [
      { level:1, min:0,    max:50,   label:"Новичок",  icon:"🌱" },
      { level:2, min:50,   max:150,  label:"Ученик",   icon:"📚" },
      { level:3, min:150,  max:300,  label:"Знаток",   icon:"🔭" },
      { level:4, min:300,  max:500,  label:"Эксперт",  icon:"🏆" },
      { level:5, min:500,  max:1000, label:"Мастер",   icon:"🚀" },
      { level:6, min:1000, max:9999, label:"Легенда",  icon:"👑" }
    ];
    function getLevelInfo(pts) {
      return LEVELS.find(l => pts >= l.min && pts < l.max) || LEVELS[LEVELS.length - 1];
    }

    const RANK_ICONS = ["🥇","🥈","🥉"];
    const RANK_CLASSES = ["rank-1","rank-2","rank-3"];

    function getMyName() {
      try { return localStorage.getItem("kl_name") || ""; } catch { return ""; }
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;");
    }

    function renderRow(entry, rank) {
      const myName = getMyName();
      const isMe = myName && entry.name === myName;
      const lvl = getLevelInfo(entry.points || 0);
      const rankIcon = RANK_ICONS[rank] || (rank + 1);
      const rankClass = RANK_CLASSES[rank] || "";
      const meClass = isMe ? " lb-me" : "";
      return `<tr class="lb-row ${rankClass}${meClass}" style="animation-delay:${rank * 0.04}s">
        <td class="td-rank">${rankIcon}</td>
        <td class="td-name">
          ${escHtml(entry.name)}
          ${isMe ? '<span class="you-tag">ТЫ</span>' : ""}
        </td>
        <td class="td-xp">${(entry.points || 0).toLocaleString("ru")} XP</td>
        <td class="td-level">${lvl.icon} ${lvl.label}</td>
      </tr>`;
    }

    function formatTime(d) {
      return d.toLocaleTimeString("ru", { hour:"2-digit", minute:"2-digit", second:"2-digit" });
    }

    const app = getApps().length ? getApps()[0] : initializeApp(FIREBASE_CONFIG);
    const db  = getFirestore(app);
    const body     = document.getElementById("lb-body");
    const countEl  = document.getElementById("lb-count");
    const updatedEl = document.getElementById("lb-updated");

    const q = query(collection(db, "users"), orderBy("points", "desc"));

    onSnapshot(q, (snap) => {
      const rows = [];
      snap.forEach(doc => {
        const d = doc.data();
        if (d.name && d.points !== undefined) rows.push(d);
      });

      countEl.textContent = rows.length + " участников";

      if (rows.length === 0) {
        body.innerHTML = '<tr class="lb-empty-row"><td colspan="4">Будь первым! 🚀<br><small>Заработай XP на любой странице</small></td></tr>';
      } else {
        body.innerHTML = rows.map((r, i) => renderRow(r, i)).join("");
      }

      updatedEl.textContent = "Обновлено: " + formatTime(new Date());
    }, (err) => {
      body.innerHTML = `<tr class="lb-empty-row"><td colspan="4">Ошибка подключения 😔<br><small>${escHtml(err.message)}</small></td></tr>`;
    });
  </script>

</body>
</html>
