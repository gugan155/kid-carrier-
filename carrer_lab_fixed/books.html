<!DOCTYPE html>
<html lang="ru">
<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(160deg, #0f0a1e 0%, #1a0a2e 50%, #0a1628 100%);

      min-height: 100vh;
    }

    /* ── Header ── */
    .bk-header {
      background: linear-gradient(135deg, #1e1340 0%, #2d1b69 100%);
      border-bottom: 1px solid rgba(167,139,250,.2);
      padding: 16px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .bk-back {
      color: rgba(255,255,255,.5); text-decoration: none;
      font-size: .85rem; font-weight: 700;
      padding: 6px 12px; border-radius: 8px;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
      transition: all .2s; white-space: nowrap;
    }
    .bk-back:hover { background: rgba(255,255,255,.12); color: #fff; }
    .bk-header-title { font-size: 1.15rem; font-weight: 900; color: #fff; }
    .bk-header-sub { font-size: .75rem; color: rgba(255,255,255,.45); font-weight: 600; }

    /* ── Main ── */
    .bk-main { max-width: 860px; margin: 0 auto; padding: 24px 16px 80px; }

    /* ── Filter row ── */
    .bk-filter-row {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 24px;
    }
    .bk-filter {
      padding: 6px 14px; border-radius: 999px;
      font-family: inherit; font-size: .8rem; font-weight: 800;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      color: rgba(255,255,255,.55); cursor: pointer; transition: all .2s;
    }
    .bk-filter.active {
      background: rgba(167,139,250,.2); border-color: rgba(167,139,250,.5); color: #c4b5fd;
    }

    /* ── Career section ── */
    .bk-career-section { margin-bottom: 40px; }
    .bk-career-title {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.1rem; font-weight: 900; color: #fff;
      margin-bottom: 16px; padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .bk-career-emoji { font-size: 1.6rem; }

    /* ── Book cards ── */
    .bk-books-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }
    .bk-card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 16px;
      overflow: hidden;
      transition: transform .2s, border-color .2s;
      cursor: pointer;
    }
    .bk-card:hover { transform: translateY(-3px); border-color: rgba(167,139,250,.35); }

    .bk-card-top {
      padding: 20px 18px 14px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .bk-cover {
      font-size: 3rem; line-height: 1;
      margin-bottom: 12px; display: block;
    }
    .bk-title {
      font-size: .95rem; font-weight: 900; color: #fff;
      line-height: 1.3; margin-bottom: 4px;
    }
    .bk-author {
      font-size: .75rem; font-weight: 700;
      color: rgba(255,255,255,.4); margin-bottom: 8px;
    }
    .bk-desc {
      font-size: .8rem; font-weight: 600;
      color: rgba(255,255,255,.6); line-height: 1.5;
    }
    .bk-level {
      display: inline-block; margin-top: 8px;
      font-size: .68rem; font-weight: 800; padding: 3px 8px;
      border-radius: 999px; border: 1px solid;
    }
    .bk-level-easy   { background: rgba(16,185,129,.12); color: #34d399; border-color: rgba(16,185,129,.3); }
    .bk-level-medium { background: rgba(251,191,36,.1);  color: #fbbf24; border-color: rgba(251,191,36,.3); }
    .bk-level-hard   { background: rgba(239,68,68,.1);   color: #fca5a5; border-color: rgba(239,68,68,.3); }

    /* ── Takeaways (collapsible) ── */
    .bk-card-body { padding: 14px 18px; }
    .bk-takeaways-label {
      font-size: .72rem; font-weight: 800;
      color: rgba(167,139,250,.8); text-transform: uppercase;
      letter-spacing: .06em; margin-bottom: 8px;
    }
    .bk-takeaways { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .bk-takeaway {
      display: flex; gap: 8px; align-items: flex-start;
      font-size: .8rem; font-weight: 700;
      color: rgba(255,255,255,.75); line-height: 1.4;
    }
    .bk-takeaway-dot {
      flex-shrink: 0; width: 18px; height: 18px;
      background: rgba(167,139,250,.15); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .65rem; color: #a78bfa; font-weight: 900;
      margin-top: 1px;
    }
    .bk-why {
      margin-top: 10px; padding: 8px 10px;
      background: rgba(124,58,237,.1); border-radius: 8px;
      border-left: 3px solid #7c3aed;
      font-size: .76rem; font-weight: 700;
      color: rgba(255,255,255,.6); line-height: 1.45;
    }
    .bk-why strong { color: #c4b5fd; }

    /* ── XP badge ── */
    .bk-xp-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 12px; padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,.06);
    }
    .bk-xp-badge {
      font-size: .75rem; font-weight: 800; color: #fbbf24;
    }
    .bk-read-btn {
      padding: 5px 12px; border-radius: 8px;
      font-family: inherit; font-size: .75rem; font-weight: 800;
      border: 1px solid rgba(167,139,250,.3);
      background: rgba(124,58,237,.12); color: #c4b5fd;
      cursor: pointer; transition: all .2s;

    .bk-read-btn:hover { background: rgba(124,58,237,.25); }
    .bk-read-btn.done  { background: rgba(16,185,129,.15); border-color: rgba(16,185,129,.3); color: #34d399; }

    /* ── Toast ── */
    .bk-toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e1340; border: 1px solid rgba(167,139,250,.3);
      border-radius: 12px; padding: 12px 22px;
      font-size: .88rem; font-weight: 800; color: #fff;
      z-index: 999; transition: transform .35s ease;
      pointer-events: none; white-space: nowrap;
    }
    .bk-toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .bk-books-row { grid-template-columns: 1fr; }
    }
  </style>
</head>

          'Дрон и самолёт летят по одним и тем же законам',
          'Пилот должен чувствовать машину — не только смотреть на приборы'
        ],
        why: 'Даёт <strong>понимание физики</strong> — без этого пилот только управляет, не понимает.'
      },
      {
        cover:'📸', title:'Аэрофотография: съёмка с воздуха',
        author:'Колин Мелой', level:'easy',
        desc:'Как делать потрясающие снимки с дрона — свет, угол, композиция.',
        takeaways:[
          'Золотой час (рассвет/закат) — лучшее время для съёмки',
          'Правило третей работает и с высоты птичьего полёта',
          'Тени с воздуха создают объём которого нет на земле',
          'Планируй маршрут заранее — батарея не бесконечна',
          'Видео продаётся дороже фото: движение рассказывает историю'
        ],
        why: 'Профессиональная аэросъёмка = <strong>дрон + художественный взгляд</strong> — эта книга даёт оба.'
      }
    ]
  }
};

// ── State ──────────────────────────────────────
var activeFilter = 'all';
var readBooks = {};
try { readBooks = JSON.parse(localStorage.getItem('bk_read') || '{}'); } catch {}

function saveRead() {
  try { localStorage.setItem('bk_read', JSON.stringify(readBooks)); } catch {}
}

// ── Filter buttons ─────────────────────────────
var FILTERS = [
  { key:'all',    label:'Все' },
  { key:'space',  label:'🚀 Космос' },
  { key:'robot',  label:'🤖 Роботы' },
  { key:'cyber',  label:'🛡️ Кибербез.' },
  { key:'doctor', label:'🏥 Медицина' },
  { key:'game',   label:'🎮 Игры' },
  { key:'drone',  label:'✈️ Дроны' },
];

function buildFilters() {
  var row = document.getElementById('filter-row');
  row.innerHTML = FILTERS.map(function(f) {
    return '<button class="bk-filter'+(f.key==='all'?' active':'')+
      '" onclick="setFilter(\''+f.key+'\', this)">'+f.label+'</button>';
  }).join('');
}

function setFilter(key, btn) {
  activeFilter = key;
  document.querySelectorAll('.bk-filter').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderBooks();
}

// ── Render ─────────────────────────────────────
function renderBooks() {
  var container = document.getElementById('books-container');
  var html = '';

  var careers = activeFilter === 'all' ? Object.keys(BOOKS) : [activeFilter];

  careers.forEach(function(cKey) {
    var career = BOOKS[cKey];
    if (!career) return;

    html += '<div class="bk-career-section">'+
      '<div class="bk-career-title">'+
        '<span class="bk-career-emoji">'+career.emoji+'</span>'+
        career.label+
      '</div>'+
      '<div class="bk-books-row">'+
      career.books.map(function(bk, bi) {
        var bookId = cKey + '_' + bi;
        var isRead = readBooks[bookId];
        var lvlCls = {easy:'bk-level-easy', medium:'bk-level-medium', hard:'bk-level-hard'}[bk.level];
        var lvlTxt = {easy:'Лёгкая', medium:'Средняя', hard:'Сложная'}[bk.level];

        return '<div class="bk-card">'+
          '<div class="bk-card-top">'+
            '<span class="bk-cover">'+bk.cover+'</span>'+
            '<div class="bk-title">'+bk.title+'</div>'+
            '<div class="bk-author">'+bk.author+'</div>'+
            '<div class="bk-desc">'+bk.desc+'</div>'+
            '<span class="bk-level '+lvlCls+'">'+lvlTxt+'</span>'+
          '</div>'+
          '<div class="bk-card-body">'+
            '<div class="bk-takeaways-label">5 главных идей</div>'+
            '<ul class="bk-takeaways">'+
            bk.takeaways.map(function(t, i) {
              return '<li class="bk-takeaway">'+
                '<span class="bk-takeaway-dot">'+(i+1)+'</span>'+
                '<span>'+t+'</span>'+
              '</li>';
            }).join('')+
            '</ul>'+
            '<div class="bk-why">📌 <strong>Зачем читать:</strong> '+bk.why+'</div>'+
            '<div class="bk-xp-row">'+
              '<span class="bk-xp-badge">⭐ +15 XP</span>'+
              '<button class="bk-read-btn'+(isRead?' done':'')+
                '" onclick="markRead(\''+bookId+'\', this)">'+
                (isRead ? '✅ Прочитано' : '📖 Отметить прочитанной')+
              '</button>'+
            '</div>'+
          '</div>'+
        '</div>';
      }).join('')+
      '</div></div>';
  });

  container.innerHTML = html;
}

// ── Mark book as read ──────────────────────────
function markRead(id, btn) {
  if (readBooks[id]) return;
  readBooks[id] = true;
  saveRead();

  btn.textContent = '✅ Прочитано';
  btn.classList.add('done');

  // Award XP
  try {
    var p = JSON.parse(localStorage.getItem('kl_progress') || '{}');
    p.points = (p.points || 0) + 15;
    localStorage.setItem('kl_progress', JSON.stringify(p));
  } catch {}

  showToast('📚 +15 XP за прочитанную книгу!');
}

function showToast(msg) {
  var t = document.getElementById('bk-toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2800);
}

// ── Auto-highlight career from localStorage ────
function autoFilter() {
  var MAP = { explorer:'space', builder:'robot', guardian:'doctor', creator:'game', innovator:'cyber' };
  try {
    var mp = JSON.parse(localStorage.getItem('kl_my_path') || 'null');
    if (mp && mp.profile) {
      var key = MAP[mp.profile] || mp.profile;
      if (BOOKS[key]) {
        activeFilter = key;
        return;
      }
    }
  } catch {}
  try {
    var cr = JSON.parse(localStorage.getItem('kl_career_result') || 'null');
    if (cr && cr.key && BOOKS[cr.key]) { activeFilter = cr.key; }
  } catch {}
}

// ── Init ──────────────────────────────────────
autoFilter();
buildFilters();
// Mark the active filter button
document.querySelectorAll('.bk-filter').forEach(function(btn) {
  if (btn.textContent.includes(activeFilter === 'all' ? 'Все' : '')) {
    // will be set after buildFilters renders
  }
});
renderBooks();

// Fix filter button highlight after autoFilter
document.querySelectorAll('.bk-filter').forEach(function(btn) {
  btn.classList.remove('active');
  if ((activeFilter === 'all' && btn.textContent === 'Все') ||
      btn.dataset && btn.getAttribute('onclick') && btn.getAttribute('onclick').includes("'"+activeFilter+"'")) {
    btn.classList.add('active');
  }
});
</script>
<script type="module">
  import { trackPageVisit } from './js/activity-tracker.js';
  trackPageVisit();
</script>
</body>
