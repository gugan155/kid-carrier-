<html lang="ru">
<head>

  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

  <link rel="manifest" href="manifest.json"/>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      background:linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%);
      min-height:100vh;font-family:'Nunito',sans-serif;color:#fff;
      padding:16px 16px 80px;
    }

    .rm-topbar{
      display:flex;align-items:center;justify-content:space-between;
      max-width:640px;margin:0 auto 24px;
    }
    .rm-back{color:rgba(255,255,255,.45);font-size:.82rem;font-weight:700;text-decoration:none;transition:color .2s}
    .rm-back:hover{color:#fff}
    .rm-title{font-size:1rem;font-weight:900;color:#a78bfa}

    .rm-hero{
      max-width:640px;margin:0 auto 24px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12);
      border-radius:20px;padding:24px 20px;
      display:flex;align-items:center;gap:16px;
    }
    .rm-hero-emoji{font-size:3rem;flex-shrink:0}
    .rm-hero-info{}
    .rm-hero-label{font-size:.68rem;font-weight:700;color:#a855f7;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
    .rm-hero-career{font-size:1.4rem;font-weight:900;margin-bottom:4px}
    .rm-hero-sub{font-size:.82rem;color:rgba(255,255,255,.55)}

    /* Week tabs */
    .rm-week-tabs{
      max-width:640px;margin:0 auto 16px;
      display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;
    }
    .rm-week-tab{
      flex-shrink:0;padding:8px 16px;border-radius:99px;
      font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:800;
      border:1px solid rgba(255,255,255,.15);
      background:rgba(255,255,255,.06);color:rgba(255,255,255,.55);
      cursor:pointer;transition:all .2s;
    }
    .rm-week-tab.active{background:rgba(124,58,237,.3);border-color:#a855f7;color:#fff}

    /* Days */
    .rm-days{max-width:640px;margin:0 auto;display:flex;flex-direction:column;gap:12px}

    .rm-day{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.09);
      border-radius:18px;overflow:hidden;
      transition:border-color .2s;
    }
    .rm-day.today{border-color:rgba(168,85,247,.5);background:rgba(168,85,247,.07)}
    .rm-day.done-day{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.05)}

    .rm-day-header{
      display:flex;align-items:center;gap:12px;
      padding:14px 16px;cursor:pointer;
    }
    .rm-day-num{
      width:36px;height:36px;border-radius:10px;flex-shrink:0;
      background:rgba(255,255,255,.08);
      display:flex;align-items:center;justify-content:center;
      font-size:.8rem;font-weight:900;color:rgba(255,255,255,.6);
    }
    .rm-day.today .rm-day-num{background:rgba(124,58,237,.4);color:#c4b5fd}
    .rm-day.done-day .rm-day-num{background:rgba(34,197,94,.25);color:#86efac}
    .rm-day-label{flex:1}
    .rm-day-title{font-size:.92rem;font-weight:800;margin-bottom:1px}
    .rm-day-subtitle{font-size:.72rem;color:rgba(255,255,255,.4)}
    .rm-day-badge{
      font-size:.68rem;font-weight:800;padding:3px 8px;
      border-radius:99px;flex-shrink:0;
    }
    .rm-badge-today{background:rgba(168,85,247,.2);color:#c4b5fd;border:1px solid rgba(168,85,247,.4)}
    .rm-badge-done{background:rgba(34,197,94,.15);color:#86efac;border:1px solid rgba(34,197,94,.3)}
    .rm-badge-locked{background:rgba(255,255,255,.06);color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.1)}

    .rm-day-body{padding:0 16px 16px;display:none}
    .rm-day-body.open{display:block}

    /* Tasks */
    .rm-tasks{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
    .rm-task{
      display:flex;align-items:flex-start;gap:12px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.07);
      border-radius:12px;padding:12px;
      cursor:pointer;transition:all .15s;
    }
    .rm-task:hover{background:rgba(255,255,255,.07)}
    .rm-task.checked{
      background:rgba(34,197,94,.08);
      border-color:rgba(34,197,94,.25);
    }
    .rm-task-check{
      width:22px;height:22px;border-radius:6px;flex-shrink:0;
      border:2px solid rgba(255,255,255,.2);
      display:flex;align-items:center;justify-content:center;
      margin-top:1px;transition:all .2s;
      font-size:.85rem;
    }
    .rm-task.checked .rm-task-check{
      background:#22c55e;border-color:#22c55e;
    }
    .rm-task-content{flex:1}
    .rm-task-type{
      font-size:.62rem;font-weight:800;text-transform:uppercase;
      letter-spacing:.08em;color:#a855f7;margin-bottom:3px;
    }
    .rm-task-text{font-size:.88rem;font-weight:700;color:rgba(255,255,255,.88);line-height:1.4;margin-bottom:3px}
    .rm-task-detail{font-size:.76rem;color:rgba(255,255,255,.45);line-height:1.4}
    .rm-task-xp{
      font-size:.7rem;font-weight:800;color:#fde68a;flex-shrink:0;margin-top:2px;
    }

    /* Day complete button */
    .rm-day-complete-btn{
      width:100%;padding:11px;border-radius:12px;
      background:linear-gradient(135deg,rgba(34,197,94,.2),rgba(16,185,129,.2));
      border:1px solid rgba(34,197,94,.3);
      color:#86efac;font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:800;
      cursor:pointer;transition:all .2s;
    }
    .rm-day-complete-btn:hover{background:linear-gradient(135deg,rgba(34,197,94,.3),rgba(16,185,129,.3))}
    .rm-day-complete-btn:disabled{opacity:.5;cursor:default}

    /* Bottom streak bar */
    .rm-streak-bar{
      max-width:640px;margin:20px auto 0;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.09);
      border-radius:16px;padding:16px;
      display:flex;align-items:center;gap:14px;
    }
    .rm-streak-icon{font-size:1.8rem}
    .rm-streak-info{flex:1}
    .rm-streak-val{font-size:1.1rem;font-weight:900;color:#fbbf24}
    .rm-streak-label{font-size:.75rem;color:rgba(255,255,255,.45);margin-top:1px}
    .rm-xp-total{text-align:right}
    .rm-xp-val{font-size:1.1rem;font-weight:900;color:#a78bfa}
    .rm-xp-label{font-size:.72rem;color:rgba(255,255,255,.4);margin-top:1px}

    /* No career screen */
    .rm-no-career{
      max-width:480px;margin:60px auto;text-align:center;
    }
    .rm-no-icon{font-size:3.5rem;margin-bottom:16px}
    .rm-no-title{font-size:1.3rem;font-weight:900;margin-bottom:10px}
    .rm-no-sub{font-size:.9rem;color:rgba(255,255,255,.55);margin-bottom:24px;line-height:1.6}

    .rm-btn{
      display:inline-block;padding:14px 28px;border-radius:14px;
      background:linear-gradient(135deg,#7c3aed,#a855f7);
      color:#fff;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:800;
      text-decoration:none;margin:4px;transition:opacity .2s;
    }
    .rm-btn:hover{opacity:.9}
    .rm-btn-ghost{
      display:inline-block;padding:14px 28px;border-radius:14px;
      background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);
      color:rgba(255,255,255,.7);font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:800;
      text-decoration:none;margin:4px;transition:all .2s;
    }
    .rm-btn-ghost:hover{background:rgba(255,255,255,.12);color:#fff}
  </style>
</head>

// ─── State ───
function getProg(){ try{ return JSON.parse(localStorage.getItem('kl_progress')||'{}'); }catch(e){ return {}; } }
function saveProg(p){
  try{ localStorage.setItem('kl_progress', JSON.stringify(p)); }catch(e){}
  // Sync to Firebase so teacher dashboard stays up to date
  try{
    var uid  = localStorage.getItem('kl_uid');
    var name = localStorage.getItem('kl_name');
    if(!uid || !name) return;
    import('https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js').then(function(fa){
      Promise.all([
        import('https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js'),
        import('./firebase.config.js')
      ]).then(function(mods){
        var ff = mods[0], cfg = mods[1];
        var app = fa.getApps().length ? fa.getApps()[0] : fa.initializeApp(cfg.FIREBASE_CONFIG);
        var db  = ff.getFirestore(app);
        ff.setDoc(ff.doc(db,'users',uid),{
          name: name,
          points: p.points||0,
          streak: p.streak||0,
          badges: p.badges||[],
          quizDone: p.quizDone||0,
          simDone: p.simDone||0,
          lessonsCompleted: Object.keys(p.lessonsCompleted||{}).length,
          updated: ff.serverTimestamp()
        },{merge:true}).catch(function(){});
      }).catch(function(){});
    }).catch(function(){});
  }catch(e){}
}

function getCareer(){
  // Priority: my-path result > problems result > career-quiz result
  try{
    var myPath = JSON.parse(localStorage.getItem('kl_my_path')||'null');
    if(myPath && myPath.profile){
      var map = {explorer:'space', builder:'robot', guardian:'doctor', creator:'game', innovator:'cyber'};
      return map[myPath.profile] || null;
    }
  }catch(e){}
  try{
    var result = localStorage.getItem('kl_career_result');
    if(result){ var r = JSON.parse(result); return r.key || null; }
  }catch(e){}
  return null;
}

function getTaskDoneKey(dayIdx, taskIdx){ return 'rm_d'+dayIdx+'_t'+taskIdx; }
function getDayDoneKey(dayIdx){ return 'rm_day'+dayIdx+'_done'; }

function isTaskDone(dayIdx, taskIdx){
  try{ return localStorage.getItem(getTaskDoneKey(dayIdx,taskIdx)) === '1'; }catch(e){ return false; }
}
function setTaskDone(dayIdx, taskIdx, val){
  try{ localStorage.setItem(getTaskDoneKey(dayIdx,taskIdx), val?'1':'0'); }catch(e){}
}
function isDayDone(dayIdx){
  try{ return localStorage.getItem(getDayDoneKey(dayIdx)) === '1'; }catch(e){ return false; }
}
function setDayDone(dayIdx){
  try{ localStorage.setItem(getDayDoneKey(dayIdx),'1'); }catch(e){}
}

function getTodayIdx(){
  // First uncompleted day, max 6
  for(var i=0;i<7;i++){ if(!isDayDone(i)) return i; }
  return 6;
}

    // Days
    '<div class="rm-days">';

  week.days.forEach(function(day, di){

          '<div class="rm-task-content">'+
            '<div class="rm-task-type">'+task.type+'</div>'+
            '<div class="rm-task-text">'+task.text+'</div>'+
            '<div class="rm-task-detail">'+task.detail+'</div>'+
          '</div>'+
          '<div class="rm-task-xp">+'+task.xp+'XP</div>'+
        '</div>';
    });

    html +=
          '</div>'+
          (!done && !locked
            ? '<button class="rm-day-complete-btn" data-di="'+di+'" id="complete-'+di+'">✅ День завершён! Получить XP</button>'
            : '')+
        '</div>'+
      '</div>';
  });

  html += '</div>';

  // Streak bar
  html +=
    '<div class="rm-streak-bar">'+
      '<span class="rm-streak-icon">🔥</span>'+
      '<div class="rm-streak-info">'+
        '<div class="rm-streak-val">'+streak+' дней подряд</div>'+
        '<div class="rm-streak-label">Приходи каждый день!</div>'+
      '</div>'+
      '<div class="rm-xp-total">'+
        '<div class="rm-xp-val">'+totalXP+' XP</div>'+
        '<div class="rm-xp-label">Всего очков</div>'+
      '</div>'+
    '</div>';

  container.innerHTML = html;

  // Bind day header toggles
  document.querySelectorAll('.rm-day-header').forEach(function(hdr){
    hdr.addEventListener('click', function(){
      var di = parseInt(this.dataset.di);
      var body = document.getElementById('body-'+di);
      body.classList.toggle('open');
    });
  });

  // ── XP toast helper ──
  function showXpToast(el, amount) {
    var toast = document.createElement('div');
    toast.textContent = '+' + amount + ' XP!';
    toast.style.cssText = [
      'position:fixed',
      'background:linear-gradient(135deg,#7c3aed,#ec4899)',
      'color:#fff','font-size:.85rem','font-weight:900',
      'padding:6px 14px','border-radius:20px',
      'pointer-events:none','z-index:9999',
      'transition:transform .7s ease,opacity .7s ease',
      'transform:translateY(0)','opacity:1'
    ].join(';');
    var rect = el.getBoundingClientRect();
    toast.style.top  = (rect.top + window.scrollY - 10) + 'px';
    toast.style.left = (rect.right + 8) + 'px';
    document.body.appendChild(toast);
    requestAnimationFrame(function(){
      toast.style.transform = 'translateY(-40px)';
      toast.style.opacity   = '0';
    });
    setTimeout(function(){ toast.remove(); }, 750);
  }

  // XP already-awarded guard key
  function xpAwardedKey(di, ti){ return 'rm_d' + di + '_t' + ti + '_xp'; }
  function wasXpAwarded(di, ti){ try{ return localStorage.getItem(xpAwardedKey(di,ti)) === '1'; }catch(e){ return false; } }
  function markXpAwarded(di, ti){ try{ localStorage.setItem(xpAwardedKey(di,ti), '1'); }catch(e){} }

  // Bind task checkboxes
  document.querySelectorAll('.rm-task').forEach(function(task){
    task.addEventListener('click', function(){
      var di = parseInt(this.dataset.di);
      var ti = parseInt(this.dataset.ti);
      var now = !isTaskDone(di, ti);
      setTaskDone(di, ti, now);
      this.classList.toggle('checked', now);
      var check = this.querySelector('.rm-task-check');
      check.textContent = now ? '✓' : '';

      // Award XP only on FIRST check — never on toggle or re-check
      if(now && !wasXpAwarded(di, ti)){
        markXpAwarded(di, ti);
        var xp = parseInt(this.querySelector('.rm-task-xp').textContent.replace(/\D/g,'')) || 5;
        var p = getProg();
        p.points = (p.points||0) + xp;
        saveProg(p);
        var xpVal = document.querySelector('.rm-xp-val');
        if(xpVal) xpVal.textContent = p.points + ' XP';
        showXpToast(this, xp);
      }
    });
  });

  // Bind complete day buttons
  document.querySelectorAll('.rm-day-complete-btn').forEach(function(btn){
    // Prevent double-click spam
    btn.addEventListener('click', function(){
      this.disabled = true;
      this.style.opacity = '.5';
      var di = parseInt(this.dataset.di);
      var day = week.days[di];
      setDayDone(di);

      // Award remaining XP
      var earnedXP = 0;
      day.tasks.forEach(function(task, ti){
        if(!isTaskDone(di,ti)){
          setTaskDone(di,ti,true);
          earnedXP += (task.xp||5);
        }
      });
      if(earnedXP > 0){
        var p = getProg();
        p.points = (p.points||0) + earnedXP;
        p.streak = (p.streak||0) + 1;
        saveProg(p);
      }

      // Re-render
      render();

      // Check journey completion after re-render
      var totalDays = week.days.length;
      var allDone = true;
      for (var d = 0; d < totalDays; d++) {
        if (!isDayDone(d)) { allDone = false; break; }
      }
      if (allDone) {
        setTimeout(function(){ showJourneyComplete(); }, 600);
        return;
      }

      // Scroll to next day
      setTimeout(function(){
        var next = document.getElementById('day-'+(di+1));
        if(next) next.scrollIntoView({behavior:'smooth', block:'start'});
      }, 300);
    });
  });
}

// ═══ JOURNEY COMPLETION CELEBRATION ═══
function showJourneyComplete() {
  var name  = '';
  var xp    = 0;
  try { name = localStorage.getItem('kl_name') || 'Герой'; } catch(e){}
  try { xp   = JSON.parse(localStorage.getItem('kl_progress') || '{}').points || 0; } catch(e){}

  // Create overlay
  var overlay = document.createElement('div');
  overlay.id = 'journey-complete-overlay';
  overlay.style.cssText = [
    'position:fixed','top:0','left:0','width:100%','height:100%',
    'background:rgba(10,8,30,.97)',
    'z-index:9999',
    'display:flex','align-items:center','justify-content:center',
    'flex-direction:column','text-align:center','padding:24px',
    'opacity:0','transition:opacity .5s ease'
  ].join(';');

  overlay.innerHTML =
    // Confetti layer
    '<div id="jc-confetti" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden"></div>' +

    // Card
    '<div style="' +
      'background:linear-gradient(135deg,rgba(124,58,237,.3),rgba(236,72,153,.2));' +
      'border:1px solid rgba(124,58,237,.4);border-radius:28px;' +
      'padding:40px 32px;max-width:440px;width:100%;position:relative;z-index:1' +
    '">' +
      '<div style="font-size:4rem;margin-bottom:8px;animation:jcBounce .6s ease">🏆</div>' +
      '<h1 style="font-size:1.6rem;font-weight:900;color:#fff;margin:0 0 8px;line-height:1.2">' +
        name + ', ты прошёл<br>весь путь! 🎉' +
      '</h1>' +
      '<p style="color:rgba(255,255,255,.6);font-size:.9rem;margin:0 0 20px">7 дней. Каждое задание. Без пропусков.</p>' +

      // XP badge
      '<div style="' +
        'background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.3);' +
        'border-radius:16px;padding:14px 20px;margin-bottom:24px;' +
        'display:inline-block' +
      '">' +
        '<div style="font-size:1.8rem;font-weight:900;color:#fbbf24">' + xp.toLocaleString('ru') + ' XP</div>' +
        '<div style="font-size:.75rem;color:rgba(255,255,255,.5);margin-top:2px">Заработано за весь путь</div>' +
      '</div>' +

      // Action buttons
      '<div style="display:flex;flex-direction:column;gap:10px">' +
        '<a href="certificate.html" style="' +
          'background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;' +
          'border-radius:14px;padding:14px 24px;font-size:.95rem;font-weight:900;' +
          'text-decoration:none;display:block' +
        '">🎓 Получить мой сертификат →</a>' +
        '<a href="index.html" style="' +
          'background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);' +
          'color:rgba(255,255,255,.8);border-radius:14px;padding:12px 24px;' +
          'font-size:.88rem;font-weight:700;text-decoration:none;display:block' +
        '">🏠 Вернуться на главную</a>' +
      '</div>' +
    '</div>';

  document.body.appendChild(overlay);

  // Animate in
  requestAnimationFrame(function() {
    overlay.style.opacity = '1';
  });

  // Launch confetti
  launchConfetti();
}

function launchConfetti() {
  var container = document.getElementById('jc-confetti');
  if (!container) return;

  var COLORS = ['#7c3aed','#ec4899','#fbbf24','#34d399','#60a5fa','#f87171'];
  var pieces = 80;

  for (var i = 0; i < pieces; i++) {
    (function(idx) {
      var el = document.createElement('div');
      var size = 8 + Math.random() * 10;
      var color = COLORS[Math.floor(Math.random() * COLORS.length)];
      var left  = Math.random() * 100;
      var delay = Math.random() * 2;
      var dur   = 2.5 + Math.random() * 2;
      var rotate= Math.random() * 360;

      el.style.cssText = [
        'position:absolute',
        'top:-20px',
        'left:' + left + '%',
        'width:' + size + 'px',
        'height:' + (size * 0.6) + 'px',
        'background:' + color,
        'border-radius:2px',
        'animation:jcFall ' + dur + 's ' + delay + 's linear forwards',
        'transform:rotate(' + rotate + 'deg)',
        'opacity:.9'
      ].join(';');

      container.appendChild(el);
    })(i);
  }

  // Inject animation keyframes once
  if (!document.getElementById('jc-styles')) {
    var style = document.createElement('style');
    style.id  = 'jc-styles';
    style.textContent =
      '@keyframes jcFall {' +
        'from { transform: translateY(0) rotate(0deg); opacity: .9; }' +
        'to   { transform: translateY(110vh) rotate(720deg); opacity: 0; }' +
      '}' +
      '@keyframes jcBounce {' +
        '0%,100% { transform: scale(1); }' +
        '40%     { transform: scale(1.3); }' +
        '70%     { transform: scale(.9); }' +
      '}';
    document.head.appendChild(style);
  }
}

render();
</script>
<script type="module" src="js/ani-chat-connect.js"></script>
<script type="module">
  import { trackPageVisit } from './js/activity-tracker.js';
  trackPageVisit();
</script>
